name: Build happ-openwrt

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install packages
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib \
          g++-multilib gettext git libncurses5-dev libssl-dev python3-distutils \
          rsync unzip zlib1g-dev file wget

      - name: Download OpenWrt SDK
        run: |
          wget https://downloads.openwrt.org/releases/23.05.5/targets/mediatek/filogic/openwrt-sdk-23.05.5-mediatek-filogic_gcc-12.3.0_musl.Linux-x86_64.tar.xz
          tar -xf openwrt-sdk-*.tar.xz
          mv openwrt-sdk-* sdk

      - name: Extract happ package
        run: |
          mkdir -p sdk/package/happ-openwrt
          unzip happ-openwrt.zip -d temp
          cp -r temp/happ-openwrt/* sdk/package/happ-openwrt/ || cp -r temp/* sdk/package/happ-openwrt/

      - name: Build package
        run: |
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          make defconfig
          make package/happ-openwrt/compile V=s

      - name: Upload IPK
        uses: actions/upload-artifact@v4
        with:
          name: happ-openwrt-ipk
          path: sdk/bin/packages/**/*.ipk
